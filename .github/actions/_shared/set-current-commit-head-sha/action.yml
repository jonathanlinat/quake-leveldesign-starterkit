name: set-current-commit-head-sha
description: Sets the short HEAD SHA of the current commit as an environment variable.
inputs:
  CICD_WORKING_DIRECTORY:
    required: false
runs:
  using: composite
  steps:
    - working-directory: ${{ inputs.CICD_WORKING_DIRECTORY }}
      run: |
        set -euo pipefail
        echo "GIT_CURRENT_COMMIT_HEAD_SHA=$(git rev-parse --short=10 HEAD)" >> $GITHUB_ENV
      shell: bash
