name: make-dynamic-uses
description: Invokes a composite action dynamically by path and inputs.
inputs:
  USES_INPUTS:
    required: true
  USES_PATH:
    required: true
runs:
  using: composite
  steps:
    - uses: jenseng/dynamic-uses@v1
      with:
        uses: ${{ inputs.USES_PATH }}
        with: ${{ inputs.USES_INPUTS }}
