name: "Windows: Build the binaries"
runs:
  using: composite
  steps:
    - name: Checkout the artifact repository files
      run: git clone --depth 1 --recursive https://github.com/${{ env.ARTIFACT_REPOSITORY }} working-directory/
      shell: bash
    - name: Create the VCPKG directory
      working-directory: working-directory/
      run: mkdir -p ${{ github.workspace }}/vcpkg/bincache
      shell: bash
    - name: Set some environment variables
      working-directory: working-directory/
      run: |
        echo "ACTIONS_CACHE_URL=${{ env.ACTIONS_CACHE_URL }}" >> $GITHUB_ENV
        echo "ACTIONS_RUNTIME_TOKEN=${{ env.ACTIONS_RUNTIME_TOKEN }}" >> $GITHUB_ENV
        echo "TB_PULL_REQUEST_HEAD_SHA_HASH=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
      shell: bash
    - name: Install Pandoc
      working-directory: working-directory/
      run: |
        Invoke-WebRequest https://github.com/jgm/pandoc/releases/download/2.11.3.1/pandoc-2.11.3.1-windows-x86_64.zip -OutFile pandoc.zip
        7z x "pandoc.zip" -o"." -y
        echo "$(pwd)\pandoc-2.11.3.1" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 5.15.2
        arch: win64_msvc2019_64
    - name: Compile the source code
      working-directory: working-directory/
      run: |
        $Env:QT5_INSTALL_DIR = $env:Qt5_DIR
        cmd.exe /c CI-windows.bat
      shell: pwsh
      env:
        TB_ARCH: ${{ matrix.tb-arch }}
        TB_OS_IMAGE: ${{ matrix.os }}
        VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    - name: Prepare the artifact
      working-directory: working-directory/
      run: 7z x "cmakebuild\${env:ARTIFACT_NAME}-*.7z" -o"${env:ARTIFACT_DIRECTORY_NAME}-windows\" -y
      shell: pwsh
    - name: Pack and upload the artifact
      uses: actions/upload-artifact@v4
      with:
        path: working-directory/${{ env.ARTIFACT_DIRECTORY_NAME }}-windows/
        name: ${{ env.ARTIFACT_DIRECTORY_NAME }}-binaries-windows
        if-no-files-found: error
        retention-days: 1
